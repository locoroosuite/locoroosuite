<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Print</title>
</head>
<body>
  <h1>{{ message["subject"] }}</h1>
  <p>From {{ message["sender"] }} &middot; To {{ message["recipients"] }}{% if cc_display %} &middot; Cc {{ cc_display }}{% endif %}</p>
  <pre>{{ message["snippet"] }}</pre>
</body>
</html>
