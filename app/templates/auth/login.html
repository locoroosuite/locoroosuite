{% extends "layout.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white/90 border border-slate-200/80 rounded-2xl p-6 shadow-sm">
  <h1 class="text-xl font-semibold mb-1 text-slate-900">Domain Management Login</h1>
  <p class="text-sm text-slate-500 mb-4">Admin / Manager</p>
  {% if error %}
  <div class="mb-3 text-sm text-red-600">{{ error }}</div>
  {% endif %}
  <form method="post" action="{{ url_for('auth.login') }}" class="space-y-3">
    <div>
      <label class="block text-sm font-medium">Email</label>
      <input name="email" type="email" class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm shadow-sm focus:border-slate-300 focus:outline-none focus:ring-2 focus:ring-slate-200" required />
    </div>
    <div>
      <label class="block text-sm font-medium">Password</label>
      <input name="password" type="password" class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm shadow-sm focus:border-slate-300 focus:outline-none focus:ring-2 focus:ring-slate-200" required />
    </div>
    <button class="w-full bg-slate-900 text-white rounded-lg py-2 text-sm">Login</button>
  </form>
</div>
{% endblock %}
