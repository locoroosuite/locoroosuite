upstream flask_app {
    server app:5001;
}

upstream mcp_app {
    server app:8001;
}

upstream collabora {
    server collabora:9980;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name {{ SERVER_NAME }};

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 60m;

    # --- MCP Server (ASGI/uvicorn) ---
    location /mcp {
        proxy_pass http://mcp_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # --- Flask application ---
    location / {
        proxy_pass http://flask_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Collabora Online (browser-facing) ---
    # Static assets (JS, CSS, images)
    location ^~ /collabora/browser {
        proxy_pass http://collabora;
        proxy_set_header Host $http_host;
    }

    # WOPI discovery endpoint
    location ^~ /collabora/hosting/discovery {
        proxy_pass http://collabora;
        proxy_set_header Host $http_host;
    }

    # Collabora Capabilities
    location ^~ /collabora/hosting/capabilities {
        proxy_pass http://collabora;
        proxy_set_header Host $http_host;
    }

    # Main Collabora websocket + HTTP
    location ^~ /collabora/ {
        proxy_pass http://collabora;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 36000s;
        proxy_send_timeout 36000s;
    }
}
