!include conf.d/*.conf

protocols = imap lmtp sieve

mail_location = maildir:/var/mail/vhosts/%d/%n
mail_privileged_group = vmail
mail_uid = vmail
mail_gid = vmail

first_valid_uid = 5000
last_valid_uid = 5000
first_valid_gid = 5000
last_valid_gid = 5000

lda_mailbox_autocreate = yes
lda_mailbox_autosubscribe = yes

namespace inbox {
  inbox = yes
  location =
  mailbox Drafts {
    special_use = \Drafts
    auto = subscribe
  }
  mailbox Junk {
    special_use = \Junk
    auto = subscribe
  }
  mailbox Sent {
    special_use = \Sent
    auto = subscribe
  }
  mailbox Trash {
    special_use = \Trash
    auto = subscribe
  }
  mailbox Archive {
    special_use = \Archive
    auto = subscribe
  }
  prefix =
}

service auth {
  unix_listener /var/spool/postfix/private/auth {
    mode = 0666
  }
  unix_listener auth-userdb {
    mode = 0600
    user = vmail
    group = vmail
  }
}

service lmtp {
  unix_listener /var/spool/postfix/private/dovecot-lmtp {
    mode = 0666
  }
}

service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

service managesieve-login {
  inet_listener sieve {
    port = 4190
  }
}

plugin {
  # Sieve storage lives OUTSIDE the maildir. When mail_home == mail_location
  # (as in this dev setup), putting the active-script symlink (~/) inside the
  # maildir makes Dovecot expose phantom "\NoSelect" mailboxes (e.g. a virtual
  # "dovecot" folder from .dovecot.sieve) that cannot be SELECTed and only
  # produce sync errors. Keep it under a dedicated, non-maildir path.
  sieve = file:/var/lib/dovecot-sieve/%d/%n;active=/var/lib/dovecot-sieve/%d/%n/default.sieve
  quota = maildir:User quota
  quota_rule = *:storage=0
}

protocol lmtp {
  mail_plugins = sieve quota
}

protocol lda {
  mail_plugins = sieve quota
}

protocol imap {
  mail_plugins = quota imap_quota
}

log_path = /dev/stdout
info_log_path = /dev/stdout
debug_log_path = /dev/stdout
auth_debug = yes
mail_debug = yes
