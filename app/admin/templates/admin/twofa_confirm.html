{% extends "admin/base.html" %}
{% block admin_content %}
<div class="bg-white border border-slate-200 rounded-lg p-6 max-w-lg">
  <h1 class="text-xl font-semibold mb-4 text-slate-900">Enable 2FA</h1>

  {% if error %}
  <div class="mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-2 text-sm text-red-700">{{ error }}</div>
  {% endif %}

  <div class="space-y-4">
    <div>
      <p class="text-sm text-slate-600 mb-3">Scan this QR code with your authenticator app (Google Authenticator, Authy, 1Password, etc.).</p>
      <div class="flex justify-center rounded-lg border border-slate-200 bg-white p-4">
        <img src="{{ url_for('admin.twofa_qr') }}" alt="QR code" class="w-48 h-48" />
      </div>
    </div>

    <div>
      <p class="text-sm text-slate-600 mb-1">Can't scan? Enter this key manually:</p>
      <div class="rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 font-mono text-sm text-slate-700 select-all">{{ secret }}</div>
    </div>

    <form method="post" action="{{ url_for('admin.twofa_confirm') }}" class="space-y-3">
      <div>
        <label class="block text-sm font-medium text-slate-700">Enter the 6-digit code from your app</label>
        <input name="code" type="text" inputmode="numeric" maxlength="6" required class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm shadow-sm focus:border-slate-300 focus:outline-none focus:ring-2 focus:ring-slate-200 tracking-widest text-center text-lg" />
      </div>
      <button class="bg-slate-900 text-white rounded-lg px-4 py-2 text-sm">Confirm and Enable</button>
    </form>

    <a href="{{ url_for('admin.twofa_settings') }}" class="block text-xs text-slate-400 hover:text-slate-600">Cancel</a>
  </div>
</div>
{% endblock %}
