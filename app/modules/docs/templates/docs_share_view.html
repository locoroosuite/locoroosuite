<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ share.doc_name or 'Document' }} — Shared with you</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { height: 100%; overflow: hidden; font-family: 'Manrope', ui-sans-serif, system-ui; }
    #editor-frame { width: 100%; height: 100%; border: none; display: block; }

    #share-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 16px;
      background: rgba(255,255,255,0.95); backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(226,232,240,0.6);
    }

    .share-bar-left { display: flex; align-items: center; gap: 10px; }
    .share-bar-right { display: flex; align-items: center; gap: 8px; }

    .share-logo {
      display: flex; align-items: center; gap: 6px;
      font-size: 14px; font-weight: 600; color: #0f172a;
    }
    .share-logo-icon {
      height: 24px; width: 24px; border-radius: 6px; background: #0f172a;
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
    }

    .share-doc-name { font-size: 13px; font-weight: 500; color: #0f172a; max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .share-ext { font-size: 11px; color: #94a3b8; text-transform: uppercase; }

    .share-meta { font-size: 12px; color: #64748b; }
    .share-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 500; padding: 2px 8px;
      border-radius: 6px;
    }
    .share-badge.view { background: #f1f5f9; color: #475569; }
    .share-badge.write { background: #eff6ff; color: #1d4ed8; }
  </style>
</head>
<body>

<div id="share-bar">
  <div class="share-bar-left">
    <div class="share-logo">
      <div class="share-logo-icon">LR</div>
      <span>LocoRoo Docs</span>
    </div>
    <div style="width:1px;height:20px;background:#e2e8f0;"></div>
    <span class="share-doc-name">{{ share.doc_name or 'Document' }}</span>
    <span class="share-ext">.{{ share.doc_type or 'odt' }}</span>
  </div>
  <div class="share-bar-right">
    <span class="share-meta">Shared by {{ owner_email if owner_email is defined else share.recipient_email }}</span>
    <span class="share-badge {{ share.permission }}">
      {% if share.permission == 'write' %}
      <svg style="width:12px;height:12px;" viewBox="0 0 20 20" fill="currentColor"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.38-2.83-2.828z"/></svg>
      Can edit
      {% else %}
      <svg style="width:12px;height:12px;" viewBox="0 0 20 20" fill="currentColor"><path d="M10 12a2 2 0 002-2V6a2 2 0 10-4 0v4a2 2 0 002 2z"/><path d="M10 0s-8 4.5-8 9v4l4 4h8l4-4v-4c0-4.5-8-9-8-9zm6 12.17l-2.83 2.83H6.83L4 12.17V9c0-3.03 4.45-6.43 6-7.53C11.55 2.57 16 5.97 16 9v3.17z"/></svg>
      Can view
      {% endif %}
    </span>
  </div>
</div>

<iframe id="editor-frame" src="{{ collabora_src }}" allow="clipboard-read; clipboard-write" style="margin-top:44px;height:calc(100% - 44px);"></iframe>

</body>
</html>
